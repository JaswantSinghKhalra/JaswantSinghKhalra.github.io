            letter-spacing: -0.5px;
        }

        .movie-desc {

            color: #888;

        /* 📱 Video Player Wrapper (Responsive Auto-Size) */
        .video-wrapper {
            width: 100%;
            background-color: #000;
            border: 2px solid #222;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: auto; /* ਮੋਬਾਈਲ 'ਤੇ ਆਪੇ ਛੋਟਾ ਹੋ ਜਾਵੇਗਾ */
            display: block;

            border-top: none;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }

        .controls-text {
            font-size: 14px;
            font-weight: 700;
            color: #aaa;
        }

        /* Download Button Styling */
        .download-btn {
            background-color: #c04a2c;
            color: #fff;
            padding: 12px 25px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            border: 2px solid #111;
            box-shadow: 4px 4px 0px #111;
            transition: all 0.2s ease;
            display: inline-block;
        }
        .download-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #111;
            background-color: #a33e25;
        }

        /* Mobile Responsive */
        @media(max-width: 768px) {
            .movie-title { font-size: 30px; }
            .controls-bar { flex-direction: column; gap: 15px; text-align: center; }
            .download-btn { width: 100%; box-sizing: border-box; text-align: center; }
        }
        @media(max-width: 600px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .movie-section { margin: 30px auto; }
        }
    </style>
</head>
