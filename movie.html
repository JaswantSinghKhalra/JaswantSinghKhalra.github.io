<!DOCTYPE html>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0c0908; /* Dark Theme */
            color: #f4eee0; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }

        /* Top Bar & Header */
        .top-bar { background-color: #111; color: #d4ccb8; padding: 8px 0; font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; overflow: hidden; border-bottom: 2px solid #c04a2c; }
        .top-bar span { display: inline-block; padding-left: 100%; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; border-bottom: 1px solid #333; background-color: #111; }
        .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: #f4eee0; letter-spacing: 1px; text-decoration: none; }
        .btn-back { background-color: transparent; color: #f4eee0; border: 1px solid #555; padding: 10px 20px; font-size: 12px; font-weight: bold; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-back:hover { background-color: #c04a2c; border-color: #c04a2c; }

        /* Movie Section Styling */
        .movie-section {
            max-width: 1000px; /* PC ਲਈ ਵੱਧ ਤੋਂ ਵੱਧ ਚੌੜਾਈ */
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }

        .movie-title {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 900;
            color: #c04a2c;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .movie-desc {
            font-size: 15px;
            color: #aaa;
            margin: 0 0 30px 0;
        }

        /* 📱 Responsive Video iframe (ਮੋਬਾਈਲ ਤੇ ਆਟੋ ਸਾਈਜ਼ ਲਈ) */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background-color: #000;
            border: 2px solid #222;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            border-radius: 8px;
            overflow: hidden;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Download Button Styling */
        .download-btn {
            display: inline-block;
            background-color: #c04a2c;
            color: #fff;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            border: 2px solid #111;
            box-shadow: 4px 4px 0px #111;
            border-radius: 5px;
            margin-top: 35px;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        
        .download-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #111;
            background-color: #9b1c1c; /* ਥੋੜਾ ਗੂੜ੍ਹਾ ਲਾਲ */
        }

        /* Mobile Responsive adjustments */
        @media(max-width: 600px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .movie-title { font-size: 28px; }
            .download-btn { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
