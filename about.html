<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - ਸੱਚਾਈ ਦੀ ਆਵਾਜ਼</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f1ea; margin: 0; padding: 40px; color: #111; }
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 3px solid #111; margin-bottom: 30px; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; }
        .btn-logout { background: #111; color: #fff; padding: 12px 25px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 3px 3px 0px #c04a2c; }
        
        table { width: 100%; border-collapse: collapse; background: #fff; box-shadow: 6px 6px 0px #111; border: 2px solid #111; }
        th, td { padding: 18px; text-align: left; border-bottom: 1px solid #ccc; font-size: 14px; }
        th { background-color: #111; color: #fff; text-transform: uppercase; letter-spacing: 1.5px; font-size: 12px; }
        tr:hover { background-color: #f9f9f9; }
        
        .badge { background: #c04a2c; color: white; padding: 6px 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; border-radius: 4px; }
        .accused-text { color: #c04a2c; font-weight: bold; font-size: 16px; }
        .btn-view { background: #1a4331; color: #fff; border: 2px solid #111; padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; box-shadow: 2px 2px 0px #111; }
        .btn-view:hover { background: #111; }

        /* Modal (Popup) CSS */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: #f4f1ea; margin: 5% auto; padding: 30px; border: 3px solid #111; width: 85%; max-width: 800px; box-shadow: 10px 10px 0px #111; position: relative; }
        .close { color: #c04a2c; position: absolute; right: 20px; top: 20px; font-size: 35px; font-weight: bold; cursor: pointer; line-height: 1; }
        .close:hover { color: #111; }
        .detail-row { margin-bottom: 15px; font-size: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .detail-row strong { text-transform: uppercase; font-size: 11px; color: #555; display: block; margin-bottom: 4px; letter-spacing: 1px; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; margin-top: 0; border-bottom: 2px solid #111; padding-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">ADMIN PANEL - ਗੁਪਤ ਡੈਸ਼ਬੋਰਡ</div>
        <button class="btn-logout" onclick="logout()">LOGOUT (ਬਾਹਰ ਜਾਓ)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ਮਿਤੀ (Date)</th>
                <th>ਸ਼ਿਕਾਇਤਕਰਤਾ (Email)</th>
                <th>ਦੋਸ਼ੀ ਦਾ ਨਾਮ (Accused)</th>
                <th>ਸਟੇਟਸ (Status)</th>
                <th>ਐਕਸ਼ਨ (Action)</th>
            </tr>
        </thead>
        <tbody id="complaint-list">
            <tr><td colspan="5" class="loader">⏳ ਡਾਟਾ ਲੋਡ ਹੋ ਰਿਹਾ ਹੈ...</td></tr>
        </tbody>
    </table>

    <!-- Popup Box -->
    <div id="complaintModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title">ਸ਼ਿਕਾਇਤ ਦਾ ਪੂਰਾ ਵੇਰਵਾ</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAkD_PomZqaa9rA76Emnm2YRxBmB-fsmYo",
            authDomain: "sachdiawaaz-376ee.firebaseapp.com",
            projectId: "sachdiawaaz-376ee",
            databaseURL: "https://sachdiawaaz-376ee-default-rtdb.firebaseio.com",
            storageBucket: "sachdiawaaz-376ee.firebasestorage.app",
            messagingSenderId: "551243696190",
            appId: "1:551243696190:web:d64b3600f26c227b08696f"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const SECRET_KEY = "Mera_Khatarnak_Password_@2026!";
        let allComplaintsData = {}; // ਸਾਰੀਆਂ ਸ਼ਿਕਾਇਤਾਂ ਸੇਵ ਕਰਨ ਲਈ

        firebase.auth().onAuthStateChanged(user => {
            if (!user) { window.location.replace("login.html"); } 
            else { fetchComplaints(); }
        });

        function logout() { firebase.auth().signOut().then(() => window.location.href = "login.html"); }

        function decryptData(encryptedText) {
            try {
                if(!encryptedText) return "N/A";
                const bytes = CryptoJS.AES.decrypt(encryptedText, SECRET_KEY);
                return bytes.toString(CryptoJS.enc.Utf8) || encryptedText;
            } catch(e) { return encryptedText; }
        }

        function fetchComplaints() {
            database.ref('complaints').on('value', (snapshot) => {
                const list = document.getElementById('complaint-list');
                list.innerHTML = ""; 
                const data = snapshot.val();

                if (!data) {
                    list.innerHTML = "<tr><td colspan='5'>ਹਾਲੇ ਤੱਕ ਕੋਈ ਸ਼ਿਕਾਇਤ ਦਰਜ ਨਹੀਂ ਹੋਈ।</td></tr>";
                    return;
                }

                allComplaintsData = data; 
                const keys = Object.keys(data).reverse();

                keys.forEach(key => {
                    const item = data[key];
                    const date = new Date(item.timestamp).toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                    const realEmail = decryptData(item.email);
                    const realAccused = decryptData(item.accused_name);

                    list.innerHTML += `
                        <tr>
                            <td>${date}</td>
                            <td><strong>${realEmail}</strong></td>
                            <td class="accused-text">${realAccused}</td>
                            <td><span class="badge">${item.status || 'Pending'}</span></td>
                            <td><button class="btn-view" onclick="viewComplaint('${key}')">ਪੂਰੀ ਪੜ੍ਹੋ (View)</button></td>
                        </tr>
                    `;
                });
            }, (error) => {
                list.innerHTML = `<tr><td colspan='5' style="color:red; font-weight:bold;">❌ Error: ਤੁਹਾਨੂੰ ਇਹ ਡਾਟਾ ਪੜ੍ਹਨ ਦੀ ਇਜਾਜ਼ਤ ਨਹੀਂ ਹੈ।</td></tr>`;
            });
        }

        // ਪੌਪ-ਅੱਪ ਖੋਲ੍ਹਣ ਵਾਲਾ ਫੰਕਸ਼ਨ
        function viewComplaint(key) {
            const item = allComplaintsData[key];
            const modalBody = document.getElementById('modal-body');
            
            if(item.full_data) {
                try {
                    const decryptedStr = CryptoJS.AES.decrypt(item.full_data, SECRET_KEY).toString(CryptoJS.enc.Utf8);
                    const fullData = JSON.parse(decryptedStr);
                    
                    modalBody.innerHTML = `
                        <div style="display:flex; gap:20px; flex-wrap:wrap;">
                            <div style="flex:1; min-width:250px;">
                                <h3 style="color:#c04a2c; margin-top:0;">ਸ਼ਿਕਾਇਤਕਰਤਾ (Complainant)</h3>
                                <div class="detail-row"><strong>ਨਾਮ:</strong> ${fullData.name}</div>
                                <div class="detail-row"><strong>ਪਿਤਾ ਦਾ ਨਾਮ:</strong> ${fullData.father_name}</div>
                                <div class="detail-row"><strong>ਈਮੇਲ:</strong> ${fullData.email}</div>
                                <div class="detail-row"><strong>ਮੋਬਾਈਲ:</strong> ${fullData.mobile}</div>
                                <div class="detail-row"><strong>ਆਧਾਰ ਕਾਰਡ:</strong> ${fullData.aadhaar}</div>
                                <div class="detail-row"><strong>ਜਨਮ ਤਰੀਕ:</strong> ${fullData.dob}</div>
                            </div>
                            <div style="flex:1; min-width:250px;">
                                <h3 style="color:#c04a2c; margin-top:0;">ਦੋਸ਼ੀ ਦੀ ਜਾਣਕਾਰੀ (Accused)</h3>
                                <div class="detail-row"><strong>ਨਾਮ:</strong> ${fullData.accused_name}</div>
                                <div class="detail-row"><strong>ਅਹੁਦਾ:</strong> ${fullData.accused_post || 'N/A'}</div>
                                <div class="detail-row"><strong>ਦਫ਼ਤਰ:</strong> ${fullData.accused_workplace || 'N/A'}</div>
                                <div class="detail-row"><strong>ਮੋਬਾਈਲ:</strong> ${fullData.accused_mobile || 'N/A'}</div>
                            </div>
                        </div>
                        <h3 style="color:#c04a2c; margin-top:20px;">ਘਟਨਾ ਅਤੇ ਸਬੂਤ (Details)</h3>
                        <div class="detail-row"><strong>ਘਟਨਾ ਵਾਲੀ ਜਗ੍ਹਾ:</strong> ${fullData.location}</div>
                        <div class="detail-row"><strong>ਸਬੂਤ (Drive Link):</strong> <a href="${fullData.evidence_link}" target="_blank" style="color: blue;">ਇੱਥੇ ਕਲਿੱਕ ਕਰੋ (Click to open)</a></div>
                        <div class="detail-row" style="background:#fff; padding:15px; border:1px solid #ccc; line-height:1.6;"><strong>ਪੂਰਾ ਵੇਰਵਾ (Description):</strong> ${fullData.complaint_details}</div>
                    `;
                } catch(e) {
                    modalBody.innerHTML = `<h3 style="color:red;">❌ ਡਾਟਾ ਡੀਕ੍ਰਿਪਟ ਕਰਨ ਵਿੱਚ ਐਰਰ! (ਸਿਕ੍ਰੇਟ ਕੀ ਗਲਤ ਹੋ ਸਕਦੀ ਹੈ)</h3>`;
                }
            } else {
                // ਪੁਰਾਣੀ ਟੈਸਟ ਸ਼ਿਕਾਇਤ (ਜੋ ਤੁਹਾਡੇ ਸਕ੍ਰੀਨਸ਼ਾਟ ਵਿੱਚ ਹੈ) ਲਈ ਮੈਸੇਜ
                modalBody.innerHTML = `
                    <div style="padding: 20px; background: #ffe6e6; border-left: 4px solid red;">
                        <h3 style="margin-top:0; color: red;">⚠️ ਪੁਰਾਣਾ ਰਿਕਾਰਡ</h3>
                        <p>ਇਹ ਤੁਹਾਡੀ ਪੁਰਾਣੀ ਟੈਸਟ ਸ਼ਿਕਾਇਤ ਹੈ। ਉਦੋਂ ਪੂਰਾ ਫਾਰਮ ਸੇਵ ਕਰਨ ਵਾਲਾ ਕੋਡ ਨਹੀਂ ਲਗਾਇਆ ਗਿਆ ਸੀ, ਇਸ ਲਈ ਇਸ ਵਿੱਚ ਸਿਰਫ਼ ਈਮੇਲ ਅਤੇ ਦੋਸ਼ੀ ਦਾ ਨਾਮ ਹੀ ਸੇਵ ਹੋਇਆ ਹੈ। ਨਵੀਆਂ ਸ਼ਿਕਾਇਤਾਂ ਇੱਥੇ ਪੂਰੀਆਂ ਖੁੱਲ੍ਹਣਗੀਆਂ!</p>
                    </div>
                `;
            }
            
            document.getElementById('complaintModal').style.display = 'block';
        }

        // ਪੌਪ-ਅੱਪ ਬੰਦ ਕਰਨ ਵਾਲਾ ਫੰਕਸ਼ਨ
        function closeModal() { document.getElementById('complaintModal').style.display = 'none'; }
        
        // ਬਾਹਰ ਕਲਿੱਕ ਕਰਨ 'ਤੇ ਵੀ ਬੰਦ ਹੋ ਜਾਵੇ
        window.onclick = function(event) {
            const modal = document.getElementById('complaintModal');
            if (event.target == modal) { modal.style.display = "none"; }
        }
    </script>
</body>
</html>
