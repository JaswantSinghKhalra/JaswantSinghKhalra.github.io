<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਸਿਸਟਮ ਲੌਗਿਨ - ਸੱਚ ਦੀ ਆਵਾਜ਼</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0c0908; /* Dark Background */
            color: #f4eee0; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Login Box Styling */
        .login-box {
            background-color: #161210;
            border: 1px solid #2a2523;
            padding: 50px 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .secure-tag {
            color: #c04a2c;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: #f4eee0;
            margin: 0 0 30px 0;
            letter-spacing: -0.5px;
        }

        /* Divider (LOGIN WITH EMAIL) */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #555;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333;
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: #ece8df;
            border: 1px solid #ccc;
            color: #111;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            background-color: #fff;
            border-color: #c04a2c;
        }

        /* 🔴 Password Field & Eye Icon Setup */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-wrapper input {
            background-color: #1e1a18; /* Darker input for password as per screenshot */
            color: #fff;
            border: 1px solid #333;
            padding-right: 45px; /* ਅੱਖ (eye) ਲਈ ਜਗ੍ਹਾ ਛੱਡੀ ਹੈ */
        }
        .password-wrapper input:focus {
            border-color: #c04a2c;
            background-color: #111;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            cursor: pointer;
            font-size: 16px;
            user-select: none;
            opacity: 0.7;
            transition: 0.3s;
        }
        .eye-icon:hover {
            opacity: 1;
        }

        /* Button Styling */
        .login-btn {
            background-color: #c04a2c;
            color: white;
            padding: 15px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background-color: #9b1c1c;
        }

        /* Links */
        .links {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
        .links a {
            color: #aaa;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .links a:hover {
            color: #f4eee0;
        }
        .forgot-pwd {
            display: inline-block;
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
        }
        .register-link {
            color: #f4eee0 !important;
            border-bottom: 1px solid #f4eee0;
        }

    </style>
</head>
<body>

    <div class="login-box">
        <div class="secure-tag">SECURE PORTAL</div>
        <h1 class="login-title">ਸਿਸਟਮ ਲੌਗਿਨ.</h1>

        <div class="divider">LOGIN WITH EMAIL</div>

        <form id="loginForm">
            <!-- Email Field -->
            <div class="form-group">
                <label>EMAIL ADDRESS (ਈਮੇਲ)</label>
                <input type="email" id="email" placeholder="Amritbieber789@gmail.com" required>
            </div>

            <!-- Password Field with Eye Icon -->
            <div class="form-group">
                <label>PASSWORD (ਪਾਸਵਰਡ)</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••••••" required>
                    <!-- 🔴 ਅੱਖ ਵਾਲਾ ਬਟਨ -->
                    <span class="eye-icon" id="togglePassword" onclick="showHidePassword()">👁️</span>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="login-btn">LOGIN ➔</button>
        </form>

        <!-- Bottom Links -->
        <div class="links">
            <a href="#" class="forgot-pwd">ਪਾਸਵਰਡ ਭੁੱਲ ਗਏ?</a><br>
            Don't have an account? <a href="#" class="register-link">Register</a>
        </div>
    </div>

    <!-- 🔴 Password Show/Hide JavaScript -->
    <script>
        function showHidePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                // ਜੇਕਰ ਪਾਸਵਰਡ ਛੁਪਿਆ ਹੈ, ਤਾਂ ਦਿਖਾਓ
                passwordInput.type = 'text';
                eyeIcon.innerText = '🙈'; // ਅੱਖ ਬੰਦ ਵਾਲਾ ਇਮੋਜੀ
            } else {
                // ਜੇਕਰ ਪਾਸਵਰਡ ਦਿਖ ਰਿਹਾ ਹੈ, ਤਾਂ ਛੁਪਾਓ
                passwordInput.type = 'password';
                eyeIcon.innerText = '👁️'; // ਅੱਖ ਖੁੱਲੀ ਵਾਲਾ ਇਮੋਜੀ
            }
        }
    </script>

</body>
</html>
