<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਸਿਸਟਮ ਲੌਗਿਨ - ਸੱਚ ਦੀ ਆਵਾਜ਼</title>
    
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0c0908; /* Dark Background */
            color: #f4eee0; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Login Box Styling */
        .login-box {
            background-color: #161210;
            border: 1px solid #2a2523;
            padding: 50px 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .secure-tag {
            color: #c04a2c;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: #f4eee0;
            margin: 0 0 30px 0;
            letter-spacing: -0.5px;
        }

        /* Divider (LOGIN WITH EMAIL) */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #555;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333;
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: #ece8df;
            border: 1px solid #ccc;
            color: #111;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            background-color: #fff;
            border-color: #c04a2c;
        }

        /* Password Field Setup */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-wrapper input {
            background-color: #1e1a18;
            color: #fff;
            border: 1px solid #333;
            padding-right: 45px; 
        }
        .password-wrapper input:focus {
            border-color: #c04a2c;
            background-color: #111;
        }

        /* 🔴 NEW WINDOWS STYLE EYE ICON CSS 🔴 */
        .eye-icon {
            position: absolute;
            right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            color: #888;
        }
        .eye-icon:hover {
            color: #c04a2c;
        }

        /* reCAPTCHA Styling */
        .recaptcha-container {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        /* Button Styling */
        .login-btn {
            background-color: #c04a2c;
            color: white;
            padding: 15px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .login-btn:hover {
            background-color: #9b1c1c;
        }
        .login-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Error Message */
        #error-msg {
            color: #ff4d4d;
            font-size: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
        }

        /* Links */
        .links {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
        .links a {
            color: #aaa;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .links a:hover {
            color: #f4eee0;
        }
        .forgot-pwd {
            display: inline-block;
            margin-bottom: 15px;
            border-bottom: 1px solid #555;
        }
        .register-link {
            color: #f4eee0 !important;
            border-bottom: 1px solid #f4eee0;
        }

    </style>
</head>
<body>

    <div class="login-box">
        <div class="secure-tag">SECURE PORTAL</div>
        <h1 class="login-title">ਸਿਸਟਮ ਲੌਗਿਨ.</h1>

        <div class="divider">LOGIN WITH EMAIL</div>

        <form id="loginForm">
            <div class="form-group">
                <label>EMAIL ADDRESS (ਈਮੇਲ)</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label>PASSWORD (ਪਾਸਵਰਡ)</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••••••" required>
                    
                    <span class="eye-icon" id="togglePassword" onclick="showHidePassword()">
                        <svg viewBox="0 0 24 24" width="22" height="22">
                            <path d="M6 12 C 6 6, 18 6, 18 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="16" r="2" fill="currentColor" stroke="none"/>
                        </svg>
                    </span>
                </div>
            </div>

            <div class="recaptcha-container">
                <div class="g-recaptcha" data-sitekey="6LfeGlltAAAAAFwhHDppckgFUwjbkFCbnFWVQjFe" data-theme="dark"></div>
            </div>

            <div id="error-msg"></div>

            <button type="submit" class="login-btn" id="loginBtn">LOGIN ➔</button>
        </form>

        <div class="links">
            <a href="#" class="forgot-pwd">ਪਾਸਵਰਡ ਭੁੱਲ ਗਏ?</a><br>
            Don't have an account? <a href="register.html" class="register-link">Register</a>
        </div>
    </div>

    <script>
        // 1. Firebase Config Setup (ਆਪਣੀ ਅਸਲੀ Config ਪਾਓ)
        const firebaseConfig = {
            apiKey: "AIzaSyAkD_PomZqaa9rA76Emnm2YRxBmB-fsmYo",
            authDomain: "sachdiawaaz-376ee.firebaseapp.com",
            projectId: "sachdiawaaz-376ee",
            databaseURL: "https://sachdiawaaz-376ee-default-rtdb.firebaseio.com",
            storageBucket: "sachdiawaaz-376ee.firebasestorage.app",
            messagingSenderId: "551243696190",
            appId: "1:551243696190:web:d64b3600f26c227b08696f"
        };
        firebase.initializeApp(firebaseConfig);

        // 2. Windows Style Password Show/Hide Toggle
        function showHidePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.style.color = '#c04a2c';
            } else {
                passwordInput.type = 'password';
                eyeIcon.style.color = '#888';
            }
        }

        // 3. Login Authentication & reCAPTCHA Verification
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('loginBtn');
            
            // Check reCAPTCHA status
            const recaptchaResponse = grecaptcha.getResponse();
            if(recaptchaResponse.length === 0) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "❌ ਕਿਰਪਾ ਕਰਕੇ 'I'm not a robot' ਬਾਕਸ ਨੂੰ ਟਿੱਕ ਕਰੋ।";
                return;
            }

            // UI Loading state
            errorMsg.style.display = 'none';
            btn.innerText = "LOGGING IN...";
            btn.disabled = true;

            // Execute Firebase Login
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    window.location.replace("complaint.html");
                })
                .catch((error) => {
                    btn.innerText = "LOGIN ➔";
                    btn.disabled = false;
                    errorMsg.style.display = 'block';
                    
                    if(error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        errorMsg.innerText = "❌ ਈਮੇਲ ਜਾਂ ਪਾਸਵਰਡ ਗਲਤ ਹੈ।";
                    } else {
                        errorMsg.innerText = "❌ " + error.message;
                    }
                    
                    // Reset reCAPTCHA on failure
                    grecaptcha.reset();
                });
        });
    </script>

</body>
</html>
