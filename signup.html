<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ਸੱਚਾਈ ਦੀ ਆਵਾਜ਼</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: url('bg.jpg') center/cover no-repeat; background-color: #0a0a0a; color: #fff; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(20,10,0,0.85) 100%); z-index: 1; }
        .auth-box { position: relative; z-index: 2; background: rgba(20, 15, 12, 0.95); padding: 40px; width: 100%; max-width: 380px; box-sizing: border-box; border: 1px solid #3a2218; box-shadow: 0 15px 35px rgba(0,0,0,0.9); }
        .top-label { color: #c04a2c; font-size: 10px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 900; margin: 0 0 30px; text-align: center; color: #f4eee0; }
        
        .divider { display: flex; align-items: center; color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider::before { margin-right: 10px; } .divider::after { margin-left: 10px; }
        
        label { display: block; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; color: #888; margin-bottom: 8px; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; box-sizing: border-box; border: 1px solid #2a2420; background: #1a1614; color: white; font-family: inherit; font-size: 14px; transition: border 0.3s; }
        input:focus { outline: none; border-color: #c04a2c; }
        
        .btn-primary { background: #c04a2c; color: white; padding: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; transition: background 0.3s; }
        .btn-primary:hover { background: #a33b20; }
        
        .footer-link { text-align: center; margin-top: 25px; font-size: 12px; color: #888; }
        .footer-link a { color: #fff; text-decoration: none; border-bottom: 1px solid #fff; padding-bottom: 2px; }
        .footer-link a:hover { color: #c04a2c; border-color: #c04a2c; }
        #error-msg { color: #ff4d4d; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="auth-box">
        <div class="top-label">ENLIST YOURSELF</div>
        <h2>ਸਿਸਟਮ ਨਾਲ ਜੁੜੋ.</h2>

        <div class="divider">REGISTER WITH EMAIL</div>

        <label>EMAIL ADDRESS (ਈਮੇਲ)</label>
        <input type="email" id="email" placeholder="you@example.com">

        <label>PASSWORD (ਪਾਸਵਰਡ)</label>
        <input type="password" id="password" placeholder="Min. 6 characters">

        <p id="error-msg"></p>
        <button class="btn-primary" onclick="registerUser()">REGISTER ➔</button>

        <div class="footer-link">
            Already registered? <a href="login.html">Sign in</a>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAkD_PomZqaa9rA76Emnm2YRxBmB-fsmYo",
            authDomain: "sachdiawaaz-376ee.firebaseapp.com",
            projectId: "sachdiawaaz-376ee",
            storageBucket: "sachdiawaaz-376ee.firebasestorage.app",
            messagingSenderId: "551243696190",
            appId: "1:551243696190:web:d64b3600f26c227b08696f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function registerUser() {
            let e = document.getElementById("email").value;
            let p = document.getElementById("password").value;
            
            if(p.length < 6) {
                document.getElementById("error-msg").innerText = "ਪਾਸਵਰਡ ਘੱਟੋ-ਘੱਟ 6 ਅੱਖਰਾਂ ਦਾ ਹੋਣਾ ਚਾਹੀਦਾ ਹੈ।";
                return;
            }

            auth.createUserWithEmailAndPassword(e, p)
            .then((userCredential) => {
                userCredential.user.sendEmailVerification().then(() => {
                    auth.signOut().then(() => {
                        alert("ਖਾਤਾ ਬਣ ਗਿਆ ਹੈ! ਅਸੀਂ ਤੁਹਾਡੀ ਈਮੇਲ 'ਤੇ ਇੱਕ ਲਿੰਕ ਭੇਜਿਆ ਹੈ। ਲੌਗਿਨ ਕਰਨ ਤੋਂ ਪਹਿਲਾਂ ਆਪਣੀ ਈਮੇਲ ਖੋਲ੍ਹ ਕੇ ਉਸ ਲਿੰਕ 'ਤੇ ਕਲਿੱਕ ਕਰੋ। (Spam ਫੋਲਡਰ ਵੀ ਚੈੱਕ ਕਰ ਲਿਓ)");
                        window.location.href = "login.html";
                    });
                });
            })
            .catch(err => document.getElementById("error-msg").innerText = err.message);
        }
    </script>
</body>
</html>
