<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ਪਾਸਵਰਡ ਰੀਸੈਟ - ਸੱਚ ਦੀ ਆਵਾਜ਼</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0c0908; /* Dark Background */
            color: #f4eee0; 
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Box Styling */
        .login-box {
            background-color: #161210;
            border: 1px solid #2a2523;
            padding: 50px 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .secure-tag {
            color: #c04a2c;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            color: #f4eee0;
            margin: 0 0 15px 0;
            letter-spacing: -0.5px;
        }

        .desc-text {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #555;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #333;
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }

        /* Form Styling */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 15px;
            background-color: #ece8df;
            border: 1px solid #ccc;
            color: #111;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            background-color: #fff;
            border-color: #c04a2c;
        }

        /* Button Styling */
        .login-btn {
            background-color: #c04a2c;
            color: white;
            padding: 15px;
            border: none;
            font-weight: bold;
            font-size: 14px;
            width: 100%;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .login-btn:hover {
            background-color: #9b1c1c;
        }
        .login-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Status Messages */
        #status-msg {
            font-size: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
            padding: 10px;
            border-radius: 4px;
        }
        .msg-error { background-color: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid #ff4d4d; }
        .msg-success { background-color: rgba(76, 175, 80, 0.1); color: #4CAF50; border: 1px solid #4CAF50; }

        /* Links */
        .links {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
        .links a {
            color: #f4eee0;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            border-bottom: 1px solid #f4eee0;
            padding-bottom: 2px;
        }
        .links a:hover {
            color: #c04a2c;
            border-color: #c04a2c;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="secure-tag">SECURE PORTAL</div>
        <h1 class="login-title">ਪਾਸਵਰਡ ਰੀਸੈਟ.</h1>
        <p class="desc-text">ਆਪਣੀ ਰਜਿਸਟਰਡ ਈਮੇਲ ਭਰੋ, ਅਸੀਂ ਤੁਹਾਨੂੰ ਪਾਸਵਰਡ ਬਦਲਣ ਦਾ ਲਿੰਕ ਭੇਜਾਂਗੇ।</p>

        <div class="divider">RESET VIA EMAIL</div>

        <form id="resetForm">
            <div class="form-group">
                <label>EMAIL ADDRESS (ਈਮੇਲ)</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <div id="status-msg"></div>

            <button type="submit" class="login-btn" id="resetBtn">SEND RESET LINK ➔</button>
        </form>

        <div class="links">
            <a href="login.html">⬅ ਵਾਪਸ ਲੌਗਿਨ ਪੇਜ 'ਤੇ ਜਾਓ</a>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAkD_PomZqaa9rA76Emnm2YRxBmB-fsmYo",
            authDomain: "sachdiawaaz-376ee.firebaseapp.com",
            projectId: "sachdiawaaz-376ee",
            databaseURL: "https://sachdiawaaz-376ee-default-rtdb.firebaseio.com",
            storageBucket: "sachdiawaaz-376ee.firebasestorage.app",
            messagingSenderId: "551243696190",
            appId: "1:551243696190:web:d64b3600f26c227b08696f"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Form Submit Event
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const statusMsg = document.getElementById('status-msg');
            const btn = document.getElementById('resetBtn');

            // Loading state
            statusMsg.style.display = 'none';
            statusMsg.className = '';
            btn.innerText = "SENDING LINK...";
            btn.disabled = true;

            // Firebase Password Reset Request
            auth.sendPasswordResetEmail(email)
                .then(() => {
                    // Success
                    btn.innerText = "SEND RESET LINK ➔";
                    btn.disabled = false;
                    statusMsg.className = 'msg-success';
                    statusMsg.innerText = "✔ ਈਮੇਲ ਚੈੱਕ ਕਰੋ! ਰੀਸੈਟ ਲਿੰਕ ਭੇਜ ਦਿੱਤਾ ਗਿਆ ਹੈ।";
                    statusMsg.style.display = 'block';
                    document.getElementById('resetForm').reset(); // Clear input
                })
                .catch((error) => {
                    // Error
                    btn.innerText = "SEND RESET LINK ➔";
                    btn.disabled = false;
                    statusMsg.className = 'msg-error';
                    
                    // Custom Punjabi Error Messages
                    if (error.code === 'auth/user-not-found') {
                        statusMsg.innerText = "❌ ਇਹ ਈਮੇਲ ਸਾਡੇ ਸਿਸਟਮ ਵਿੱਚ ਰਜਿਸਟਰਡ ਨਹੀਂ ਹੈ।";
                    } else if (error.code === 'auth/invalid-email') {
                        statusMsg.innerText = "❌ ਕਿਰਪਾ ਕਰਕੇ ਸਹੀ ਈਮੇਲ ਭਰੋ।";
                    } else {
                        statusMsg.innerText = "❌ " + error.message;
                    }
                    
                    statusMsg.style.display = 'block';
                });
        });
    </script>
</body>
</html>
